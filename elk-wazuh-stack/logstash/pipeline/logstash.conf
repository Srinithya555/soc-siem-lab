# Logstash pipeline: accepts JSON events over TCP (matching the shape
# produced by detection_engine/log_simulator.py) and indexes them into
# Elasticsearch, tagged by day, so Kibana can visualize/query them and
# you can build detections as Kibana rules or export Sigma rules to
# Elastic's Detection Engine query language (EQL/KQL) via pySigma's
# elasticsearch backend.
#
# NOT verified end-to-end (see elk-wazuh-stack/docker-compose.yml header
# for why) — written against documented Logstash pipeline syntax.
input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "soc-lab-events-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
